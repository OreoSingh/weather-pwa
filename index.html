      function launchCatbus() {
        const bus = document.getElementById('ghibliCatbus');
        if (!bus || bus.classList.contains('go')) return;
        bus.classList.add('go');
        bus.addEventListener('animationend', function () {
          bus.classList.remove('go');
        }, { once: true });
      }

      function initGhibliElements() {
        if (!document.getElementById('ghibliClouds')) {
          const wrap = document.createElement('div');
          wrap.id = 'ghibliClouds';
          wrap.className = 'ghibli-clouds';
          for (let i = 0; i < 8; i++) {
            const c = document.createElement('div');
            c.className = 'ghibli-cloud';
            const w = 200 + Math.random() * 300;
            const h = w * 0.6;
            c.style.cssText = [
              'width:'  + w + 'px',
              'height:' + h + 'px',
              'top:'    + (Math.random() * 60) + 'vh',
              'left:'   + (Math.random() * 100) + 'vw',
              '--dur:'  + (30 + Math.random() * 60) + 's',
            ].join(';');
            wrap.appendChild(c);
          }
          document.body.appendChild(wrap);
        }
        if (!document.getElementById('ghibliParticles')) {
          const wrap = document.createElement('div');
          wrap.id = 'ghibliParticles';
          wrap.className = 'ghibli-particles';
          for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'ghibli-particle';
            p.style.cssText = [
              'left:'   + (Math.random() * 100) + 'vw',
              '--dx:'   + ((Math.random() - 0.5) * 200) + 'px',
              '--rot:'  + (Math.random() * 720) + 'deg',
              '--dur:'  + (10 + Math.random() * 15) + 's',
              '--delay:'+ (Math.random() * 20) + 's',
              'width:'  + (10 + Math.random() * 15) + 'px',
              'height:' + (8 + Math.random() * 12) + 'px',
            ].join(';');
            wrap.appendChild(p);
          }
          document.body.appendChild(wrap);
        }
        if (!document.getElementById('ghibliTotoro')) {
          const el = document.createElement('div');
          el.id = 'ghibliTotoro';
          el.className = 'ghibli-totoro';
          el.setAttribute('aria-hidden', 'true');
          el.innerHTML = TOTORO_SVG;
          document.body.appendChild(el);
        }
        if (!document.getElementById('ghibliCatbus')) {
          const bus = document.createElement('div');
          bus.id = 'ghibliCatbus';
          bus.className = 'ghibli-catbus';
          bus.setAttribute('aria-hidden', 'true');
          bus.innerHTML = CATBUS_SVG;
          document.body.appendChild(bus);
        }
        if (!_catbusTimer) {
          _catbusTimer = setInterval(function () {
            const cond = document.documentElement.getAttribute('data-ghibli-condition');
            if (cond === 'clear') launchCatbus();
          }, 30000);
        }
      }

      function updateGhibliVisuals(condKey) {
        const gc = ghibliConditionClass(condKey);
        document.documentElement.setAttribute('data-ghibli-condition', gc);
        const parts = document.querySelectorAll('.ghibli-particle');
        parts.forEach(p => {
          p.classList.toggle('sakura', gc === 'clear');
          p.classList.toggle('leaf', gc !== 'clear');
        });
      }

      // ── GoT condition class ───────────────────────────────────────
      function gotConditionClass(condKey) {
        if (condKey === 'clear-day')                     return 'hot';
        if (condKey === 'thunder')                       return 'storm';
        if (condKey === 'rain' || condKey === 'drizzle') return 'rain';
        return 'cold'; // snow, overcast, partly, fog, clear-night
      }

      function updateGotCondition(condKey) {
        document.documentElement.setAttribute('data-got-cond', gotConditionClass(condKey));
      }

      function initGotElements() {
        if (!document.getElementById('gotParticles')) {
          const wrap = document.createElement('div');
          wrap.id = 'gotParticles';
          wrap.className = 'got-particles';
          wrap.setAttribute('aria-hidden', 'true');
          // Add snow and rain particles
          for (let i = 0; i < 50; i++) {
            const p = document.createElement('div');
            const isRain = Math.random() > 0.5;
            p.className = 'got-particle ' + (isRain ? 'rain' : 'snow');
            const dx = (Math.random() - 0.5) * 150;
            const rot = (Math.random() - 0.5) * 40;
            p.style.cssText = [
              'left:'   + (Math.random() * 100) + 'vw',
              '--dx:'   + dx + 'px',
              '--rot:'  + rot + 'deg',
              '--fd:'   + (3 + Math.random() * 6) + 's',
              '--fd2:'  + (Math.random() * 8) + 's',
              'width:'  + (isRain ? 1 : 2 + Math.random() * 3) + 'px',
              'height:' + (isRain ? 18 : 2 + Math.random() * 3) + 'px',
            ].join(';');
            wrap.appendChild(p);
          }
          document.body.appendChild(wrap);
        }
      }

      function updateSavannaVisuals(condKey) {
        // No special condition classes for savanna yet, just basic theme
      }

      function initSavannaElements() {
        if (!document.getElementById('savannaBg')) {
          const bg = document.createElement('div');
          bg.id = 'savannaBg';
          bg.className = 'savanna-bg';
          bg.innerHTML = `
            <div class="savanna-sun"></div>
            <div class="savanna-birds-wrap" id="savannaBirds"></div>
            <svg class="savanna-layer back" viewBox="0 0 1000 100" preserveAspectRatio="none">
              <path d="M0 100 V80 Q250 60 500 80 T1000 80 V100 Z" />
            </svg>
            <svg class="savanna-layer front" viewBox="0 0 1000 100" preserveAspectRatio="none">
              <path d="M0 100 V90 Q200 70 400 90 T700 80 T1000 90 V100 Z" />
            </svg>
            <div class="savanna-shimmer"></div>
          `;
          document.body.appendChild(bg);

          const birdWrap = document.getElementById('savannaBirds');
          for (let i = 0; i < 6; i++) {
            const b = document.createElement('div');
            b.className = 'savanna-bird';
            b.innerHTML = `<svg viewBox="0 0 20 10" fill="#000"><path d="M0 5 Q5 0 10 5 T20 5 L18 6 Q10 2 2 6 Z"/></svg>`;
            b.style.cssText = [
              '--y:'     + (10 + Math.random() * 40) + 'vh',
              '--y2:'    + (10 + Math.random() * 40) + 'vh',
              '--dur:'   + (15 + Math.random() * 20) + 's',
              '--delay:' + (Math.random() * 15) + 's',
            ].join(';');
            birdWrap.appendChild(b);
          }
        }
        
        // Add parallax listener
        window.addEventListener('mousemove', (e) => {
          if (document.documentElement.getAttribute('data-theme') !== 'savanna') return;
          const x = (e.clientX / window.innerWidth - 0.5) * 20;
          const back = document.querySelector('.savanna-layer.back');
          const front = document.querySelector('.savanna-layer.front');
          if (back) back.style.transform = `translateX(${x * 0.5}px)`;
          if (front) front.style.transform = `translateX(${x}px)`;
        });
      }


      let lastCode  = null;
      let lastIsDay = true;
      let _origDescribe;
      let _origVisuals;
      let _lastAuroraGradient = '';
      const _bgEl = document.querySelector('.bg');

      function updateSigil() {
        const sigilEl = document.getElementById('gotSigil');
        if (!sigilEl || lastCode === null) return;
        const house = houseForCondition(codeToCondition(lastCode, lastIsDay));
        sigilEl.innerHTML = SIGILS[house] || '';
      }

      function getTheme() {
        try { return localStorage.getItem(THEME_KEY) || 'default'; } catch (_) { return 'default'; }
      }
      function saveTheme(t) {
        try { localStorage.setItem(THEME_KEY, t); } catch (_) {}
      }

      function applyTheme(theme) {
        // Tear down elements that belong to whichever theme we're leaving
        if (theme !== 'got') {
          ['gotParticles'].forEach(function (id) {
            const el = document.getElementById(id);
            if (el) el.remove();
          });
          document.documentElement.removeAttribute('data-got-cond');
          const mottoEl = document.getElementById('motto');
          if (mottoEl) mottoEl.style.display = 'none';
        }

        if (theme !== 'ghibli') {
          if (_catbusTimer) { clearInterval(_catbusTimer); _catbusTimer = null; }
          ['ghibliClouds', 'ghibliParticles', 'ghibliTotoro', 'ghibliCatbus'].forEach(function (id) {
            const el = document.getElementById(id);
            if (el) el.remove();
          });
          document.documentElement.removeAttribute('data-ghibli-condition');
        }

        if (theme !== 'savanna') {
          ['savannaBg'].forEach(function (id) {
            const el = document.getElementById(id);
            if (el) el.remove();
          });
          document.documentElement.removeAttribute('data-savanna-condition');
          document.documentElement.removeAttribute('data-savanna-time');
        }

        if (theme === 'default') {
          document.documentElement.removeAttribute('data-theme');
          // Restore the last Aurora gradient so default background looks correct immediately
          if (_bgEl && _lastAuroraGradient) _bgEl.style.backgroundImage = _lastAuroraGradient;
        } else {
          document.documentElement.setAttribute('data-theme', theme);
          // Clear inline style so CSS theme backgrounds can take over
          if (_bgEl) _bgEl.style.backgroundImage = '';
        }
        saveTheme(theme);

        document.querySelectorAll('.theme-option[data-theme-id]').forEach(function (btn) {
          btn.classList.toggle('active', btn.dataset.themeId === theme);
        });

        if (theme === 'got')     initGotElements();
        if (theme === 'ghibli')  initGhibliElements();
        if (theme === 'savanna') initSavannaElements();

        // Immediately re-render description + visuals for the active theme
        if (lastCode !== null) {
          const descEl = document.getElementById('description');
          if (descEl) {
            let text;
            if (theme === 'got') {
              const e = GOT_DESC[lastCode];
              text = e ? (lastIsDay ? e.d : e.n) : null;
            } else if (theme === 'ghibli') {
              const e = GHIBLI_DESC[lastCode];
              text = e ? (lastIsDay ? e.d : e.n) : null;
            } else if (theme === 'savanna') {
              const e = SAVANNA_DESC[lastCode];
              text = e ? (lastIsDay ? e.d : e.n) : null;
            }
            if (text) descEl.textContent = text;
            else if (_origDescribe) descEl.textContent = _origDescribe(lastCode, lastIsDay);
          }
          const condKey = codeToCondition(lastCode, lastIsDay);
          if (theme === 'got') {
            updateGotCondition(condKey);
            const house = houseForCondition(condKey);
            const mottoEl = document.getElementById('motto');
            if (mottoEl) {
              mottoEl.textContent = MOTTOS[house] || "";
              mottoEl.style.display = 'block';
            }
          }
          if (theme === 'ghibli')  updateGhibliVisuals(condKey);
          if (theme === 'savanna') updateSavannaVisuals(condKey);
        }

        updateSigil();
      }


      // Crossfade overlay — briefly flashes black between theme switches
      const themeFadeEl = document.getElementById('themeFade');
      function switchThemeWithFade(theme) {
        if (!themeFadeEl) { applyTheme(theme); return; }
        themeFadeEl.style.opacity = '1';
        setTimeout(() => {
          applyTheme(theme);
          themeFadeEl.style.opacity = '0';
        }, 150);
      }

      // Intercept describe — injects GoT, Ghibli, or Savanna text
      _origDescribe = window.__auroraDescribe;
      window.__auroraDescribe = function (code, isDay) {
        lastCode  = code;
        lastIsDay = isDay;
        const theme = document.documentElement.getAttribute('data-theme');
        if (theme === 'got') {
          const entry = GOT_DESC[code];
          if (entry) return isDay ? entry.d : entry.n;
        }
        if (theme === 'ghibli') {
          const entry = GHIBLI_DESC[code];
          if (entry) return isDay ? entry.d : entry.n;
        }
        if (theme === 'savanna') {
          const entry = SAVANNA_DESC[code];
          if (entry) return isDay ? entry.d : entry.n;
        }
        return _origDescribe ? _origDescribe(code, isDay) : '—';
      };

      // Intercept visuals — sigil (GoT) + Ghibli + Savanna
      _origVisuals = window.__auroraVisuals;
      window.__auroraVisuals = function (code, isDay) {
        lastCode  = code;
        lastIsDay = isDay;
        if (_origVisuals) _origVisuals(code, isDay);
        // _origVisuals sets bg.style.backgroundImage as an inline style which would
        // override CSS theme backgrounds. Save it for default, clear it for themes.
        const theme = document.documentElement.getAttribute('data-theme');
        if (!theme) {
          if (_bgEl && _bgEl.style.backgroundImage) {
            _lastAuroraGradient = _bgEl.style.backgroundImage;
          }
        } else {
          if (_bgEl) _bgEl.style.backgroundImage = '';
        }
        const condKey = codeToCondition(code, isDay);
        updateSigil();
        if (theme === 'got')     updateGotCondition(condKey);
        if (theme === 'ghibli')  updateGhibliVisuals(condKey);
        if (theme === 'savanna') updateSavannaVisuals(condKey);
      };

      // ----- Theme picker UI -----
      const themeBtn    = document.getElementById('themeBtn');
      const themePicker = document.getElementById('themePicker');

      function openPicker() {
        themePicker.classList.add('open');
        themeBtn.setAttribute('aria-expanded', 'true');
      }
      function closePicker() {
        themePicker.classList.remove('open');
        themeBtn.setAttribute('aria-expanded', 'false');
      }

      themeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        themePicker.classList.contains('open') ? closePicker() : openPicker();
      });

      document.addEventListener('click', (e) => {
        if (!e.target.closest('#themePickerWrap')) closePicker();
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closePicker();
      });

      document.querySelectorAll('.theme-option[data-theme-id]').forEach((btn) => {
        btn.addEventListener('click', () => {
          switchThemeWithFade(btn.dataset.themeId);
          closePicker();
        });
      });

      // Restore saved theme on load (no fade on initial load)
      applyTheme(getTheme());
    })();
  </script>
</body>
</html>
