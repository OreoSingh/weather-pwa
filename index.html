<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5" />
  <meta name="theme-color" content="#0b0220" />
  <meta name="description" content="Aurora — a beautiful glassmorphism weather app powered by Open-Meteo." />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Aurora" />

  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <title>Aurora Weather</title>

  <style>
    /* ----- Reset & base ----- */
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-tap-highlight-color: transparent;
      text-rendering: optimizeLegibility;
    }
    html { height: -webkit-fill-available; }
    body {
      min-height: 100vh;
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: #f4f2ff;
      overflow-x: hidden;
      position: relative;
      background: #0b0220;
    }
    button, input { font: inherit; color: inherit; }
    button { border: 0; background: none; cursor: pointer; }

    /* ----- Animated gradient background ----- */
    .bg {
      position: fixed;
      inset: 0;
      z-index: -2;
      background: linear-gradient(160deg, #1a0a3a 0%, #2a1160 35%, #1b2870 70%, #0b1a4a 100%);
      background-size: 200% 200%;
      animation: bg-shift 24s ease-in-out infinite;
      transition: background 1.2s ease;
    }
    .bg::before, .bg::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
      pointer-events: none;
      will-change: transform;
    }
    .bg::before {
      width: 60vmax; height: 60vmax;
      top: -20vmax; left: -15vmax;
      background: radial-gradient(circle, #6a2bff 0%, transparent 65%);
      animation: blob-a 22s ease-in-out infinite;
    }
    .bg::after {
      width: 55vmax; height: 55vmax;
      bottom: -20vmax; right: -20vmax;
      background: radial-gradient(circle, #1e6bff 0%, transparent 65%);
      animation: blob-b 28s ease-in-out infinite;
    }
    @keyframes bg-shift {
      0%, 100% { background-position: 0% 0%; }
      50% { background-position: 100% 100%; }
    }
    @keyframes blob-a {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(8vmax, 6vmax) scale(1.15); }
    }
    @keyframes blob-b {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-6vmax, -4vmax) scale(1.1); }
    }

    /* Star specks */
    .stars {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background-image:
        radial-gradient(1px 1px at 18% 22%, rgba(255,255,255,0.55), transparent 60%),
        radial-gradient(1px 1px at 72% 8%, rgba(255,255,255,0.4), transparent 60%),
        radial-gradient(1px 1px at 33% 78%, rgba(255,255,255,0.35), transparent 60%),
        radial-gradient(1.5px 1.5px at 88% 56%, rgba(255,255,255,0.55), transparent 60%),
        radial-gradient(1px 1px at 56% 41%, rgba(255,255,255,0.25), transparent 60%),
        radial-gradient(1px 1px at 10% 64%, rgba(255,255,255,0.35), transparent 60%);
      opacity: 0.7;
    }

    /* ----- Layout ----- */
    .app {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding:
        calc(env(safe-area-inset-top, 0px) + 20px)
        calc(env(safe-area-inset-right, 0px) + 16px)
        calc(env(safe-area-inset-bottom, 0px) + 28px)
        calc(env(safe-area-inset-left, 0px) + 16px);
      gap: 16px;
    }

    .header {
      width: 100%;
      max-width: 480px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.75);
    }
    .brand-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, #b388ff, #82b1ff);
      box-shadow: 0 0 12px rgba(130, 177, 255, 0.8);
    }

    /* ----- Search ----- */
    .search {
      width: 100%;
      max-width: 480px;
      position: relative;
      z-index: 10;
    }
    .search-input-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      transition: border-color 0.25s ease, background 0.25s ease;
    }
    .search-input-wrap:focus-within {
      border-color: rgba(179, 136, 255, 0.6);
      background: rgba(255,255,255,0.12);
    }
    .search-icon {
      width: 18px; height: 18px;
      flex-shrink: 0;
      opacity: 0.8;
    }
    .search input {
      flex: 1;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: #fff;
      font-size: 16px;
      padding: 4px 0;
    }
    .search input::placeholder { color: rgba(255,255,255,0.5); }
    .search-clear {
      display: none;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      flex-shrink: 0;
    }
    .search-clear.visible { display: inline-flex; }

    .suggestions {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      padding: 6px;
      border-radius: 18px;
      background: rgba(20, 10, 45, 0.75);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      box-shadow: 0 16px 40px rgba(0,0,0,0.45);
      max-height: 50vh;
      overflow-y: auto;
      z-index: 10;
      display: none;
    }
    .suggestions.open { display: block; }
    .suggestion {
      width: 100%;
      text-align: left;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 15px;
      color: #fff;
      display: flex;
      flex-direction: column;
      gap: 2px;
      transition: background 0.15s ease;
    }
    .suggestion:hover, .suggestion:focus-visible {
      background: rgba(255,255,255,0.1);
      outline: 0;
    }
    .suggestion .s-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
    }
    .suggestions-empty {
      padding: 14px;
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      text-align: center;
    }

    /* ----- Weather card ----- */
    .card {
      width: 100%;
      max-width: 480px;
      padding: 22px 22px 18px;
      border-radius: 28px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(24px) saturate(170%);
      -webkit-backdrop-filter: blur(24px) saturate(170%);
      box-shadow:
        0 20px 50px rgba(0,0,0,0.45),
        inset 0 1px 0 rgba(255,255,255,0.12);
      position: relative;
      overflow: hidden;
      transition: transform 0.4s ease, opacity 0.4s ease;
      z-index: 10;
    }
    .card.loading { opacity: 0.6; }
    .card.swap { opacity: 0; transform: translateY(8px); }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .location {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .city {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .region {
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .updated {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      text-align: right;
      white-space: nowrap;
    }

    .animation {
      margin: 6px auto 0;
      width: 220px;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .animation lottie-player { width: 100%; height: 100%; }
    .animation .fallback-emoji {
      font-size: 120px;
      line-height: 1;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,0.35));
      transition: opacity 0.4s ease;
    }

    .temp {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 4px;
      margin-top: 4px;
    }
    .temp-value {
      font-size: 96px;
      font-weight: 200;
      line-height: 1;
      letter-spacing: -0.04em;
      background: linear-gradient(180deg, #ffffff 0%, #d7cbff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .temp-unit {
      font-size: 28px;
      font-weight: 300;
      margin-top: 10px;
      color: rgba(255,255,255,0.85);
    }
    .description {
      text-align: center;
      margin-top: 2px;
      font-size: 18px;
      font-weight: 500;
      color: rgba(255,255,255,0.92);
      text-transform: capitalize;
      letter-spacing: 0.01em;
    }
    .feels-like {
      text-align: center;
      margin-top: 4px;
      font-size: 13px;
      color: rgba(255,255,255,0.6);
    }

    /* ----- Stats grid ----- */
    .stats {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .stat {
      padding: 12px 10px;
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-align: center;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .stat:hover { background: rgba(255,255,255,0.09); }
    .stat-icon {
      width: 22px; height: 22px;
      opacity: 0.85;
    }
    .stat-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
    }
    .stat-value {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }
    .stat-sub {
      font-size: 10px;
      color: rgba(255,255,255,0.55);
    }

    /* ----- Status / error ----- */
    .status {
      width: 100%;
      max-width: 480px;
      min-height: 20px;
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      text-align: center;
    }
    .status.error { color: #ffb4b4; }

    .footer {
      margin-top: auto;
      padding-top: 10px;
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      text-align: center;
      letter-spacing: 0.05em;
    }
    .footer a { color: rgba(255,255,255,0.65); text-decoration: none; }

    /* ----- Skeleton shimmer ----- */
    .skeleton {
      background: linear-gradient(90deg,
        rgba(255,255,255,0.06) 0%,
        rgba(255,255,255,0.14) 50%,
        rgba(255,255,255,0.06) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.4s linear infinite;
      color: transparent !important;
      border-radius: 10px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ----- Mobile polish ----- */
    @media (max-width: 380px) {
      .temp-value { font-size: 84px; }
      .animation { width: 190px; height: 190px; }
      .city { font-size: 20px; }
      .card { padding: 20px 18px 16px; border-radius: 24px; }
    }
    @media (min-height: 820px) {
      .animation { width: 240px; height: 240px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .bg, .bg::before, .bg::after { animation: none !important; }
      .card { transition: none; }
    }

    /* ----- Unit toggle ----- */
    .unit-toggle {
      display: flex;
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      overflow: hidden;
      flex-shrink: 0;
    }
    .unit-btn {
      padding: 5px 11px;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      border-radius: 18px;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .unit-btn.active {
      background: rgba(179,136,255,0.3);
      color: #fff;
    }

    /* ----- Forecast sections ----- */
    .forecast-section {
      width: 100%;
      max-width: 480px;
      border-radius: 24px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(24px) saturate(170%);
      -webkit-backdrop-filter: blur(24px) saturate(170%);
      box-shadow: 0 12px 32px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.1);
      overflow: hidden;
    }
    .forecast-title {
      padding: 13px 18px 9px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    /* ----- Hourly strip ----- */
    .hourly-list {
      display: flex;
      overflow-x: auto;
      padding: 12px 10px;
      gap: 6px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .hourly-list::-webkit-scrollbar { display: none; }
    .hourly-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 10px 8px;
      border-radius: 14px;
      min-width: 58px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      transition: background 0.2s ease;
      flex-shrink: 0;
    }
    .hourly-cell.now {
      background: rgba(179,136,255,0.18);
      border-color: rgba(179,136,255,0.35);
    }
    .hourly-cell:hover { background: rgba(255,255,255,0.09); }
    .hourly-time {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.02em;
    }
    .hourly-cell.now .hourly-time { color: #c9a9ff; }
    .hourly-emoji { font-size: 22px; line-height: 1; }
    .hourly-temp {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }
    .hourly-precip {
      font-size: 10px;
      color: rgba(130,180,255,0.85);
      min-height: 13px;
    }

    /* ----- Daily list ----- */
    .daily-list { padding: 4px 0; }
    .daily-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      transition: background 0.15s ease;
    }
    .daily-row:last-child { border-bottom: 0; }
    .daily-row:hover { background: rgba(255,255,255,0.04); }
    .daily-day {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.9);
      min-width: 72px;
    }
    .daily-emoji { font-size: 22px; flex-shrink: 0; }
    .daily-precip {
      font-size: 12px;
      color: rgba(130,180,255,0.85);
      min-width: 36px;
      text-align: center;
    }
    .daily-temps {
      margin-left: auto;
      display: flex;
      gap: 8px;
      align-items: baseline;
    }
    .daily-hi { font-size: 15px; font-weight: 600; color: #fff; }
    .daily-lo { font-size: 14px; color: rgba(255,255,255,0.45); }

    /* ----- Sun row ----- */
    .sun-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 36px;
      padding: 12px 18px 14px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .sun-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .sun-icon { font-size: 20px; line-height: 1; margin-bottom: 1px; }
    .sun-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }
    .sun-time {
      font-size: 15px;
      font-weight: 600;
      color: #ffd580;
    }

    /* ----- Header right cluster ----- */
    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ----- Theme toggle button ----- */
    .theme-picker-wrap { position: relative; }
    .theme-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.16);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.72);
      flex-shrink: 0;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }
    .theme-btn:hover, .theme-btn[aria-expanded="true"] {
      background: rgba(255,255,255,0.16);
      color: #fff;
      border-color: rgba(179,136,255,0.5);
    }
    .theme-btn svg { width: 17px; height: 17px; }

    /* ----- Theme picker panel ----- */
    .theme-picker {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      min-width: 210px;
      padding: 6px;
      border-radius: 20px;
      background: rgba(12, 6, 28, 0.94);
      border: 1px solid rgba(255,255,255,0.13);
      backdrop-filter: blur(32px) saturate(160%);
      -webkit-backdrop-filter: blur(32px) saturate(160%);
      box-shadow: 0 20px 56px rgba(0,0,0,0.6), 0 4px 16px rgba(0,0,0,0.3);
      z-index: 30;
      /* animate open/close with opacity + transform */
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(-8px) scale(0.96);
      transform-origin: top right;
      transition: opacity 0.18s ease, transform 0.18s ease,
                  visibility 0s linear 0.18s;
    }
    .theme-picker.open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateY(0) scale(1);
      transition: opacity 0.18s ease, transform 0.18s ease,
                  visibility 0s linear 0s;
    }
    .picker-label {
      padding: 7px 13px 4px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }
    .theme-option {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 12px;
      font-size: 13.5px;
      font-weight: 500;
      color: rgba(255,255,255,0.78);
      transition: background 0.14s ease, color 0.14s ease;
      text-align: left;
    }
    .theme-option:hover:not(:disabled) {
      background: rgba(255,255,255,0.08);
      color: #fff;
    }
    .theme-option.active { color: #fff; }
    .theme-option:disabled { opacity: 0.32; cursor: not-allowed; }

    /* Icon tile */
    .theme-icon {
      width: 30px;
      height: 30px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.14s ease;
    }
    .theme-option:hover:not(:disabled) .theme-icon { transform: scale(1.08); }
    .theme-icon svg { width: 14px; height: 14px; }
    .theme-icon-default { background: linear-gradient(135deg, #4820a8 0%, #2060d8 100%); }
    .theme-icon-got     { background: linear-gradient(135deg, #3c2808 0%, #7a5518 100%); }
    .theme-icon-ghibli  { background: linear-gradient(135deg, #3880b8 0%, #50a898 100%); }
    .theme-icon-savanna { background: linear-gradient(135deg, #a82808 0%, #d86818 100%); }
    .theme-icon-cs      { background: rgba(255,255,255,0.07); }

    /* Label + check */
    .theme-label { flex: 1; }
    .theme-check {
      width: 14px;
      height: 14px;
      opacity: 0;
      flex-shrink: 0;
      transition: opacity 0.14s ease;
      color: rgba(179,136,255,0.9);
    }
    .theme-option.active .theme-check { opacity: 1; }
    .theme-option.active .theme-label { font-weight: 600; }

    /* Divider */
    .theme-divider {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 4px 8px;
    }
    /* Coming-soon sub-row */
    .coming-soon-label { flex: 1; }
    .theme-badge {

       ============================================================ */
    .theme-swatch-ghibli { background: linear-gradient(135deg, #7ec8e3 0%, #a8d8c4 100%); }

    /* Totoro — fixed, peeking from the bottom-right corner */
    .ghibli-totoro {
      position: fixed;
      bottom: -18px;
      right: 22px;
      width: 88px;
      pointer-events: none;
      z-index: 4;
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 1s ease, transform 1s ease;
    }
    .ghibli-totoro svg {
      width: 100%;
      height: auto;
      display: block;
      fill: #2a3a28;
    }
    [data-theme="ghibli"][data-ghibli-condition="rain"] .ghibli-totoro,
    [data-theme="ghibli"][data-ghibli-condition="drizzle"] .ghibli-totoro {
      opacity: 0.18;
      transform: translateY(0);
    }

    /* Soot sprites — floating across the screen on cloudy days */
    .soot-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
    }
    .soot-sprite {
      position: absolute;
      border-radius: 50%;
      background: #222;
      box-shadow: 0 0 5px 2px rgba(20,20,20,0.28);
      opacity: 0;
      animation: soot-drift var(--dur, 9s) var(--delay, 0s) ease-in-out infinite;
      animation-play-state: paused;
    }
    .soot-sprite::before, .soot-sprite::after {
      content: '';
      position: absolute;
      width: 28%;
      height: 28%;
      border-radius: 50%;
      background: white;
      top: 23%;
    }
    .soot-sprite::before { left: 18%; }
    .soot-sprite::after  { right: 18%; }
    [data-theme="ghibli"][data-ghibli-condition="cloudy"] .soot-sprite {
      animation-play-state: running;
    }
    @keyframes soot-drift {
      0%   { opacity: 0;    transform: translate(0, 0); }
      8%   { opacity: 0.72; }
      25%  { transform: translate(calc(var(--tx) * -0.28), calc(var(--ty) * 0.22)); }
      55%  { transform: translate(calc(var(--tx) *  0.38), calc(var(--ty) * 0.56)); }
      78%  { transform: translate(calc(var(--tx) * -0.12), calc(var(--ty) * 0.80)); }
      90%  { opacity: 0.60; }
      100% { opacity: 0;    transform: translate(var(--tx), var(--ty)); }
    }

    }
    [data-theme="savanna"][data-savanna-time="midday"] .bg {
      background: linear-gradient(180deg, #f5c830 0%, #e88c18 45%, #c05c10 80%, #8c3808 100%);
    }
    [data-theme="savanna"][data-savanna-time="sunset"] .bg {
      background: linear-gradient(180deg, #f03c18 0%, #c02808 30%, #882010 65%, #3a0c08 100%);
    }
    [data-theme="savanna"][data-savanna-time="dusk"] .bg {
      background: linear-gradient(180deg, #7c2840 0%, #a03818 30%, #6c1c10 65%, #280c18 100%);
    }
    [data-theme="savanna"][data-savanna-time="night"] .bg {
      background: linear-gradient(180deg, #18082c 0%, #280c28 35%, #1c0c18 65%, #100810 100%);
    }

    /* Weather condition brightness/saturation modifiers */
    [data-theme="savanna"][data-savanna-condition="cloudy"] .bg { filter: brightness(0.85) saturate(0.75); }
    [data-theme="savanna"][data-savanna-condition="rain"]   .bg { filter: brightness(0.70) saturate(0.65); }
    [data-theme="savanna"][data-savanna-condition="snow"]   .bg { filter: brightness(0.90) saturate(0.30); }
    [data-theme="savanna"][data-savanna-condition="storm"]  .bg { filter: brightness(0.55) saturate(0.50); }

    /* Stars at night */
    [data-theme="savanna"] .stars { opacity: 0; transition: opacity 1.2s ease; }
    [data-theme="savanna"][data-savanna-time="dusk"]  .stars { opacity: 0.4; }
    [data-theme="savanna"][data-savanna-time="night"] .stars { opacity: 1; }

    /* ===================== Savanna: PARALLAX & ANIMALS ===================== */
    /* .savanna-bg sits BEHIND everything at z-index:-1 */
    .savanna-bg {
      position: fixed; inset: 0;
      z-index: -1; pointer-events: none;
      opacity: 0; transition: opacity 1s ease;
      overflow: hidden;
      background: linear-gradient(to bottom, #2d1b4d 0%, #c05010 40%, #e87a20 70%, #f5c040 100%);
    }
    [data-theme="savanna"] .savanna-bg { opacity: 1; }
    .savanna-layer {
      position: absolute; bottom: 0; left: -10vw; width: 120vw;
      pointer-events: none;
    }
    .savanna-layer.back  { height: 15vh; fill: #4b2c20; opacity: 0.7; }
    .savanna-layer.front { height: 10vh; fill: #1a0f0a; }

    .savanna-sun {
      position: absolute; bottom: 20vh; left: 50%;
      width: 130px; height: 130px;
      background: #fff8e1;
      border-radius: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 80px #ff6b00, 0 0 150px rgba(255,107,0,0.5);
      animation: savanna-sun-pulse 10s ease-in-out infinite;
    }
    @keyframes savanna-sun-pulse {
      0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.9; }
      50%      { transform: translateX(-50%) scale(1.05); opacity: 1; }
    }

    .savanna-birds-wrap { position: absolute; inset: 0; pointer-events: none; }
    .savanna-bird {
      position: absolute;
      width: 20px; height: 10px;
      animation: savanna-bird-fly var(--dur) var(--delay) linear infinite;
    }
    @keyframes savanna-bird-fly {
      0%   { transform: translate(-50px, var(--y)) scale(0.5); opacity: 0; }
      10%  { opacity: 0.8; }
      90%  { opacity: 0.8; }
      100% { transform: translate(110vw, var(--y2)) scale(1); opacity: 0; }
    }

    /* Heat Shimmer */
    .savanna-shimmer {
      position: absolute; bottom: 0; width: 100%; height: 10vh;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(1px);
      mask-image: linear-gradient(to top, black, transparent);
      animation: savanna-heat 2s ease-in-out infinite;
    }
    @keyframes savanna-heat {
      0%, 100% { transform: skewX(1deg) scaleY(1); }
      50%      { transform: skewX(-1deg) scaleY(1.05); }
    }

    /* Card + text overrides */
    [data-theme="savanna"] .card {
      background: rgba(20, 8, 4, 0.45);
      border-color: rgba(200, 120, 40, 0.22);
      backdrop-filter: blur(18px);
    }
    [data-theme="savanna"] .temp-value  {
      color: #ffe8b0;
      -webkit-text-fill-color: #ffe8b0;
      background: none;
    }
    [data-theme="savanna"] .description { color: #f0c880; }
    [data-theme="savanna"] .feel,
    [data-theme="savanna"] .wind,
    [data-theme="savanna"] .humidity    { color: rgba(240,200,120,0.7); }
    [data-theme="savanna"] .city        { color: #ffd080; }
    [data-theme="savanna"] .country     { color: rgba(240,200,120,0.6); }
    [data-theme="savanna"] .search-input-wrap {
      background: rgba(20, 8, 4, 0.4);
      border-color: rgba(200, 120, 40, 0.3);
    }
    [data-theme="savanna"] .search-input-wrap:focus-within {
      border-color: rgba(200, 120, 40, 0.55);
      background: rgba(20, 8, 4, 0.55);
    }
    [data-theme="savanna"] .search input { color: #ffe8c0; }
    [data-theme="savanna"] .search input::placeholder { color: rgba(240,200,120,0.45); }
    [data-theme="savanna"] .search-clear { background: rgba(200,120,40,0.18); color: rgba(240,200,120,0.8); }
    [data-theme="savanna"] .updated { color: rgba(240,200,120,0.5); }

    /* Theme picker overrides */
    [data-theme="savanna"] .theme-picker {
      background: rgba(20, 8, 4, 0.90);
      border-color: rgba(200, 120, 40, 0.25);
    }
    [data-theme="savanna"] .picker-label       { color: rgba(240,200,120,0.5); }
    [data-theme="savanna"] .theme-option        { color: rgba(240,200,120,0.85); }
    [data-theme="savanna"] .theme-option:hover:not(:disabled) { background: rgba(200,120,40,0.12); }
    [data-theme="savanna"] .theme-option.active { background: rgba(200,120,40,0.22); color: #ffe8b0; }
    [data-theme="savanna"] .theme-divider       { background: rgba(200,120,40,0.15); }
    [data-theme="savanna"] .theme-check         { color: #ffb060; }
    [data-theme="savanna"] .theme-btn {
      background: rgba(20, 8, 4, 0.4);
      border-color: rgba(200, 120, 40, 0.3);
      color: rgba(240,200,120,0.75);
    }
    [data-theme="savanna"] .theme-btn:hover,
    [data-theme="savanna"] .theme-btn[aria-expanded="true"] {
      background: rgba(20, 8, 4, 0.6);
      border-color: rgba(200, 120, 40, 0.55);
      color: #ffe8b0;
    }

    /* ===================== Ghibli: WATERCOLOR & CLOUDS ===================== */
    [data-theme="ghibli"] .card {
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(25px) saturate(1.8) contrast(0.9);
      border: 1px solid rgba(255,255,255,0.4);
    }
    .ghibli-clouds {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 1; overflow: hidden;
      opacity: 0; transition: opacity 1s ease;
    }
    [data-theme="ghibli"] .ghibli-clouds { opacity: 0.7; }
    .ghibli-cloud {
      position: absolute;
      background: white;
      border-radius: 100px;
      filter: blur(20px);
      animation: ghibli-cloud-move var(--dur) linear infinite;
      opacity: 0.4;
    }
    .ghibli-cloud::before, .ghibli-cloud::after {
      content: ''; position: absolute; background: inherit; border-radius: inherit;
    }
    @keyframes ghibli-cloud-move {
      from { transform: translateX(-150%); }
      to   { transform: translateX(150vw); }
    }

    /* Sakura / Leaves */
    .ghibli-particle {
      position: fixed; top: -20px;
      pointer-events: none; z-index: 4;
      animation: ghibli-fall var(--dur) linear infinite;
    }
    .sakura { background: #ffc0cb; border-radius: 10px 0 10px 0; }
    .leaf   { background: #8da94e; border-radius: 20px 0 20px 0; }
    @keyframes ghibli-fall {
      0%   { transform: translate(0,0) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.7; }
      100% { transform: translate(var(--dx), 110vh) rotate(var(--rot)); opacity: 0; }
    }

    /* Peeking Totoro */
    .ghibli-totoro {
      position: fixed; bottom: -20px; right: 20px;
      width: 120px; z-index: 5;
      transform: translateY(100%);
      transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    [data-theme="ghibli"] .ghibli-totoro { transform: translateY(0); }
    .ghibli-totoro svg { width: 100%; filter: drop-shadow(0 -5px 15px rgba(0,0,0,0.1)); }
    .totoro-eye { animation: totoro-blink 4s infinite; }
    @keyframes totoro-blink {
      0%, 90%, 100% { transform: scaleY(1); }
      95%           { transform: scaleY(0.1); }
    }

    /* ===================== GoT: WEATHER PARTICLES ===================== */
    .got-particles {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 3; overflow: hidden;
    }
    .got-particle {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      opacity: 0;
    }
    /* Snow */
    [data-theme="got"][data-got-cond="snow"] .got-particle.snow {
      animation: got-fall var(--fd) var(--fd2) linear infinite;
    }
    /* Rain */
    [data-theme="got"][data-got-cond="rain"] .got-particle.rain {
      background: rgba(170, 210, 255, 0.4);
      width: 1px; height: 18px;
      border-radius: 0;
      animation: got-fall var(--fd) var(--fd2) linear infinite;
    }
    @keyframes got-fall {
      0%   { transform: translate(0,-20px) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.8; }
      90%  { opacity: 0.6; }
      100% { transform: translate(var(--dx), 110vh) rotate(var(--rot, 0deg)); opacity: 0; }
    }

    /* ===================== GoT: STONE / IRON CARDS ===================== */
    [data-theme="got"] .card {
      background: radial-gradient(circle at 50% 50%, #2a2620 0%, #1a1612 100%);
      border: 2px solid #3c352a;
      border-image: linear-gradient(to bottom, #5a5040, #2a251a) 1;
      box-shadow:
        0 30px 60px rgba(0,0,0,0.8),
        inset 0 0 40px rgba(0,0,0,0.6);
    }
    /* Stone texture overlay */
    [data-theme="got"] .card::before {
      content: '';
      position: absolute; inset: 0;
      opacity: 0.08;
      background-image:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"),
        repeating-linear-gradient(45deg, transparent, transparent 10px, #000 10px, #000 11px);
      pointer-events: none; z-index: 0;
    }
    [data-theme="got"] .forecast-section {
      background: rgba(22, 18, 14, 0.92);
      border: 1px solid #3c352a;
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
    }
    [data-theme="got"] .got-sigil svg {
      width: 85%;
      max-width: 260px;
      opacity: 0.06;
      filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
    }
    [data-theme="got"] .motto {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #a08840;
      margin-top: 4px;
      font-weight: 700;
      opacity: 0.8;
    }


    /* ===================== Ghibli: TOTORO BOB ===================== */
    [data-theme="ghibli"] .ghibli-totoro {
      opacity: 0.28;
      transform: translateY(0);
      animation: totoro-bob 3.8s ease-in-out infinite;
    }
    [data-theme="ghibli"][data-ghibli-condition="rain"] .ghibli-totoro,
    [data-theme="ghibli"][data-ghibli-condition="storm"] .ghibli-totoro { opacity: 0.42; }
    @keyframes totoro-bob {
      0%,100% { transform: translateY(0px); }
      50%     { transform: translateY(-9px); }
    }

    /* ===================== Ghibli: CATBUS ===================== */
    .ghibli-catbus {
      position: fixed;
      top: 22%;
      left: -250px;
      width: 230px;
      pointer-events: none; z-index: 5;
      opacity: 0;
    }
    .ghibli-catbus.go {
      animation: catbus-dash 7.5s cubic-bezier(0.35,0,0.65,1) forwards;
    }
    @keyframes catbus-dash {
      0%   { left: -250px; opacity: 0; }
      6%   { opacity: 0.90; }
      92%  { opacity: 0.90; }
      100% { left: calc(100vw + 250px); opacity: 0; }
    }

    /* ===================== Ghibli: COLOUR-DRIFTING BLOBS ===================== */
    @keyframes ghibli-blob-a {
      0%,100% { transform: translate(0,0) scale(1);          filter: hue-rotate(0deg); }
      25%     { transform: translate(6vmax,4vmax) scale(1.12); filter: hue-rotate(28deg); }
      50%     { transform: translate(9vmax,7vmax) scale(1.20); filter: hue-rotate(-18deg); }
      75%     { transform: translate(3vmax,2vmax) scale(1.07); filter: hue-rotate(14deg); }
    }
    @keyframes ghibli-blob-b {
      0%,100% { transform: translate(0,0) scale(1);           filter: hue-rotate(0deg); }
      33%     { transform: translate(-7vmax,-3vmax) scale(1.14); filter: hue-rotate(-24deg); }
      66%     { transform: translate(-5vmax,-6vmax) scale(0.93); filter: hue-rotate(20deg); }
    }
    [data-theme="ghibli"] .bg::before { animation: ghibli-blob-a 34s ease-in-out infinite; }
    [data-theme="ghibli"] .bg::after  { animation: ghibli-blob-b 42s ease-in-out infinite; }

    /* =================== THEME CROSSFADE OVERLAY =================== */
    #themeFade {
      position: fixed;
      inset: 0;
      z-index: 90;
      pointer-events: none;
      background: #000;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
  </style>
</head>
<body>
  <div id="themeFade" aria-hidden="true"></div>
  <div class="bg" aria-hidden="true"></div>
  <div class="stars" aria-hidden="true"></div>

  <main class="app">
    <header class="header">
      <div class="brand">
        <span class="brand-dot"></span>
        <span>Aurora</span>
      </div>
      <div class="header-right">
        <div class="updated" id="updated" aria-live="polite"></div>
        <div class="theme-picker-wrap" id="themePickerWrap">
          <button class="theme-btn" id="themeBtn" aria-label="Change theme" aria-expanded="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="13.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
              <circle cx="17.5" cy="10.5" r="1" fill="currentColor" stroke="none"/>
              <circle cx="8.5" cy="7.5" r="1" fill="currentColor" stroke="none"/>
              <circle cx="6.5" cy="12.5" r="1" fill="currentColor" stroke="none"/>
              <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/>
            </svg>
          </button>
          <div class="theme-picker" id="themePicker" role="menu" aria-label="Choose theme">
            <p class="picker-label">Appearance</p>
            <button class="theme-option" data-theme-id="default" role="menuitem">
              <span class="theme-icon theme-icon-default">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              </span>
              <span class="theme-label">Default</span>
              <svg class="theme-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
            </button>
            <button class="theme-option" data-theme-id="got" role="menuitem">
              <span class="theme-icon theme-icon-got">
                <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2l2 5h4l-3.2 2.5 1.2 4.5L12 11.5 8 14l1.2-4.5L6 7h4z"/><rect x="10" y="14" width="4" height="8" rx="1"/><rect x="9" y="17" width="6" height="1.5" rx="0.75"/></svg>
              </span>
              <span class="theme-label">Game of Thrones</span>
              <svg class="theme-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
            </button>
            <button class="theme-option" data-theme-id="ghibli" role="menuitem">
              <span class="theme-icon theme-icon-ghibli">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/><circle cx="10" cy="13" r="1.2" fill="currentColor" stroke="none"/><circle cx="14" cy="13" r="1.2" fill="currentColor" stroke="none"/></svg>
              </span>
              <span class="theme-label">Studio Ghibli</span>
              <svg class="theme-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
            </button>
            <button class="theme-option" data-theme-id="savanna" role="menuitem">
              <span class="theme-icon theme-icon-savanna">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
              </span>
              <span class="theme-label">African Savanna</span>
              <svg class="theme-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
            </button>
            <div class="theme-divider"></div>
            <button class="theme-option" disabled role="menuitem" aria-disabled="true">
              <span class="theme-icon theme-icon-cs">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <span class="theme-label">Coming Soon</span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <section class="search" role="search">
      <div class="search-input-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input
          id="search"
          type="search"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="words"
          spellcheck="false"
          enterkeyhint="search"
          placeholder="Search any city…"
          aria-label="Search city"
        />
        <button class="search-clear" id="searchClear" aria-label="Clear search">&times;</button>
      </div>
      <div class="suggestions" id="suggestions" role="listbox" aria-label="City suggestions"></div>
    </section>

    <svg style="position: absolute; width: 0; height: 0;" aria-hidden="true">
      <filter id="watercolorFilter">
        <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" result="noise" />
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" />
      </filter>
    </svg>

    <article class="card" id="card" aria-live="polite">
      <div class="got-sigil" id="gotSigil" aria-hidden="true"></div>
      <div class="card-top">
        <div class="location">
          <div class="city" id="city">Brisbane</div>
          <div class="region" id="region">Queensland, Australia</div>
          <div id="motto" class="motto" style="display:none"></div>
        </div>
        <div class="unit-toggle" role="group" aria-label="Temperature unit">
          <button class="unit-btn active" id="unitC" aria-pressed="true">°C</button>
          <button class="unit-btn" id="unitF" aria-pressed="false">°F</button>
        </div>
      </div>

      <div class="animation" id="animation" aria-hidden="true">
        <span class="fallback-emoji" id="fallbackEmoji">☀️</span>
      </div>

      <div class="temp">
        <span class="temp-value" id="temp">--</span>
        <span class="temp-unit" id="tempUnit">°C</span>
      </div>
      <div class="description" id="description">Loading…</div>
      <div class="feels-like" id="feelsLike">Feels like --°</div>

      <div class="stats">
        <div class="stat">
          <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 3c-4 6-6 9-6 12a6 6 0 0 0 12 0c0-3-2-6-6-12z"></path>
          </svg>
          <span class="stat-label">Humidity</span>
          <span class="stat-value" id="humidity">--%</span>
        </div>
        <div class="stat">
          <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
          </svg>
          <span class="stat-label">UV Index</span>
          <span class="stat-value" id="uv">--</span>
          <span class="stat-sub" id="uvLevel">&nbsp;</span>
        </div>
        <div class="stat">
          <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 12h11a3 3 0 1 0-3-3"></path>
            <path d="M3 18h14a3 3 0 1 1-3 3"></path>

          <span class="stat-label">Wind</span>

      <div class="stats" style="margin-top:10px">
        <div class="stat">
          <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 2v4M12 18v4M8 12H4M20 12h-4M6.34 6.34 4.22 4.22M19.78 19.78l-2.12-2.12M17.66 6.34l2.12-2.12M4.22 19.78l2.12-2.12"></path>
            <circle cx="12" cy="12" r="4"></circle>

          <span class="stat-label">Precip</span>
          <span class="stat-value" id="precip">-- mm</span>

        <div class="stat">
          <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="9"></circle>
            <path d="M12 7v5l3 3"></path>
            <path d="M12 3v1M12 20v1M3 12h1M20 12h1"></path>
          </svg>
          <span class="stat-label">Wind Dir</span>
          <span class="stat-value" id="windDir">--</span>
        </div>
        <div class="stat">
          <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"></path>
            <circle cx="12" cy="9" r="2.5"></circle>
          </svg>
          <span class="stat-label">Pressure</span>
          <span class="stat-value" id="pressure">-- hPa</span>

    </article>

    <section class="forecast-section" id="hourlySection" style="display:none" aria-label="Hourly forecast">
      <div class="forecast-title">24-Hour Forecast</div>
      <div class="hourly-list" id="hourlyList"></div>
    </section>

    <section class="forecast-section" id="dailySection" style="display:none" aria-label="7-day forecast">
      <div class="forecast-title">7-Day Forecast</div>
      <div class="daily-list" id="dailyList"></div>
      <div class="sun-row" id="sunRow" style="display:none">
        <div class="sun-item">
          <span class="sun-icon">🌅</span>
          <span class="sun-label">Sunrise</span>
          <span class="sun-time" id="sunriseVal">--:--</span>
        </div>
        <div class="sun-item">
          <span class="sun-icon">🌇</span>
          <span class="sun-label">Sunset</span>
          <span class="sun-time" id="sunsetVal">--:--</span>

      </div>
    </section>

    <div class="status" id="status"></div>

    <footer class="footer">
      Data by <a href="https://open-meteo.com" target="_blank" rel="noopener noreferrer">Open-Meteo</a>

  <script>
    // ===== Aurora Weather — chunk 1: API + search =====
    (() => {
      'use strict';

      const GEOCODE_URL = 'https://geocoding-api.open-meteo.com/v1/search';
      const WEATHER_URL = 'https://api.open-meteo.com/v1/forecast';
      const STORAGE_KEY = 'aurora.lastCity';
      const UNIT_KEY    = 'aurora.unit';
      const BRISBANE = {
        name: 'Brisbane',
        admin1: 'Queensland',
        country: 'Australia',
        latitude: -27.4705,
        longitude: 153.0260,
      };

      const $ = (id) => document.getElementById(id);
      const el = {
        search:        $('search'),
        clear:         $('searchClear'),
        suggestions:   $('suggestions'),
        card:          $('card'),
        city:          $('city'),
        region:        $('region'),
        temp:          $('temp'),
        tempUnit:      $('tempUnit'),
        description:   $('description'),
        feelsLike:     $('feelsLike'),
        humidity:      $('humidity'),
        uv:            $('uv'),
        uvLevel:       $('uvLevel'),
        wind:          $('wind'),
        precip:        $('precip'),
        windDir:       $('windDir'),
        pressure:      $('pressure'),
        updated:       $('updated'),
        status:        $('status'),
        unitC:         $('unitC'),
        unitF:         $('unitF'),
        hourlySection: $('hourlySection'),
        hourlyList:    $('hourlyList'),
        dailySection:  $('dailySection'),
        dailyList:     $('dailyList'),
        sunRow:        $('sunRow'),
        sunriseVal:    $('sunriseVal'),
        sunsetVal:     $('sunsetVal'),
      };

      let searchAbort = null;
      let weatherAbort = null;
      let lastData     = null;
      let lastPlace    = null;

      // ----- Unit helpers -----
      function getUnit() {
        try { return localStorage.getItem(UNIT_KEY) === 'F' ? 'F' : 'C'; }
        catch (_) { return 'C'; }
      }
      function saveUnit(u) {
        try { localStorage.setItem(UNIT_KEY, u); } catch (_) {}
      }
      function toDisplay(c) {
        return getUnit() === 'F' ? Math.round(c * 9 / 5 + 32) : Math.round(c);
      }

      function windDirLabel(deg) {
        if (deg == null) return '--';
        const dirs = ['N','NE','E','SE','S','SW','W','NW'];
        return dirs[Math.round(deg / 45) % 8];
      }

      function fmtHour(isoStr) {
        const d = new Date(isoStr);
        return d.toLocaleTimeString([], { hour: 'numeric', hour12: true })
          .replace(':00', '').replace(' ', '').toLowerCase();
      }

      function fmtDay(isoStr, idx) {
        if (idx === 0) return 'Today';
        const d = new Date(isoStr + 'T12:00:00');
        return d.toLocaleDateString([], { weekday: 'short' });
      }

      function fmtSunTime(isoStr) {
        if (!isoStr) return '--:--';
        const d = new Date(isoStr);
        return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', hour12: true });
      }

      function setStatus(msg, isError = false) {
        el.status.textContent = msg || '';
        el.status.classList.toggle('error', Boolean(isError));
      }

      function debounce(fn, ms) {
        let t;
        return (...args) => {
          clearTimeout(t);
          t = setTimeout(() => fn(...args), ms);
        };
      }

      function escapeHtml(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
      }

      function formatLocation(place) {
        const parts = [];
        if (place.admin1 && place.admin1 !== place.name) parts.push(place.admin1);
        if (place.country) parts.push(place.country);
        return parts.join(', ');
      }

      function formatTime(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        return 'Updated ' + d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
      }

      function uvLevel(uv) {
        if (uv == null) return '';
        if (uv < 3) return 'Low';
        if (uv < 6) return 'Moderate';
        if (uv < 8) return 'High';
        if (uv < 11) return 'Very high';
        return 'Extreme';
      }

      // Deferred to chunk 2; safe stubs until then.
      const describeCode = (code, isDay) =>
        (window.__auroraDescribe || (() => '—'))(code, isDay);
      const renderVisuals = (code, isDay) => {
        if (window.__auroraVisuals) window.__auroraVisuals(code, isDay);
      };

      // ----- API -----
      async function geocode(query, { count = 5, signal } = {}) {
        const url = new URL(GEOCODE_URL);
        url.searchParams.set('name', query);
        url.searchParams.set('count', String(count));
        url.searchParams.set('language', 'en');
        url.searchParams.set('format', 'json');
        const res = await fetch(url, { signal });
        if (!res.ok) throw new Error('Geocoding failed');
        const data = await res.json();
        return data.results || [];
      }

      async function fetchWeather(lat, lon, { signal } = {}) {
        const url = new URL(WEATHER_URL);
        url.searchParams.set('latitude', lat);
        url.searchParams.set('longitude', lon);
        url.searchParams.set(
          'current',
          'temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,uv_index,is_day,precipitation,wind_direction_10m,surface_pressure'
        );
        url.searchParams.set(
          'hourly',
          'temperature_2m,weather_code,precipitation_probability,is_day'
        );
        url.searchParams.set(
          'daily',
          'temperature_2m_max,temperature_2m_min,weather_code,precipitation_probability_max,sunrise,sunset'
        );
        url.searchParams.set('forecast_days', '7');
        url.searchParams.set('timezone', 'auto');
        url.searchParams.set('wind_speed_unit', 'kmh');
        url.searchParams.set('temperature_unit', 'celsius');
        const res = await fetch(url, { signal });
        if (!res.ok) throw new Error('Weather failed');
        return res.json();
      }

      // ----- Forecast render -----
      function emojiForCode(code, isDayBool) {
        return (window.__auroraEmoji || (() => '🌤️'))(code, isDayBool);
      }

      function renderHourly(hourly, currentIso) {
        if (!hourly || !hourly.time || !hourly.time.length) {
          el.hourlySection.style.display = 'none';
          return;
        }
        const now = new Date(currentIso);
        const times = hourly.time;
        let startIdx = 0;
        for (let i = 0; i < times.length; i++) {
          if (new Date(times[i]) >= now) { startIdx = i; break; }
        }
        const end = Math.min(startIdx + 24, times.length);
        let html = '';
        for (let i = startIdx; i < end; i++) {
          const isNow = i === startIdx;
          const temp = toDisplay(hourly.temperature_2m[i]);
          const precip = hourly.precipitation_probability[i];
          const code = hourly.weather_code[i];
          const isDayHour = hourly.is_day[i] !== 0;
          const timeLabel = isNow ? 'Now' : fmtHour(times[i]);
          const emoji = emojiForCode(code, isDayHour);
          html += '<div class="hourly-cell' + (isNow ? ' now' : '') + '">' +
            '<span class="hourly-time">' + timeLabel + '</span>' +
            '<span class="hourly-emoji">' + emoji + '</span>' +
            '<span class="hourly-temp">' + temp + '°</span>' +
            '<span class="hourly-precip">' + (precip > 0 ? precip + '%' : '') + '</span>' +
            '</div>';
        }
        el.hourlyList.innerHTML = html;
        el.hourlySection.style.display = '';
      }

      function renderDaily(daily) {
        if (!daily || !daily.time || !daily.time.length) {
          el.dailySection.style.display = 'none';
          return;
        }
        let html = '';
        for (let i = 0; i < daily.time.length; i++) {
          const hi = toDisplay(daily.temperature_2m_max[i]);
          const lo = toDisplay(daily.temperature_2m_min[i]);
          const code = daily.weather_code[i];
          const precip = daily.precipitation_probability_max[i];
          const emoji = emojiForCode(code, true);
          const day = fmtDay(daily.time[i], i);
          html += '<div class="daily-row">' +
            '<span class="daily-day">' + day + '</span>' +
            '<span class="daily-emoji">' + emoji + '</span>' +
            '<span class="daily-precip">' + (precip > 0 ? precip + '%' : '') + '</span>' +
            '<div class="daily-temps">' +
              '<span class="daily-hi">' + hi + '°</span>' +
              '<span class="daily-lo">' + lo + '°</span>' +
            '</div>' +
            '</div>';
        }
        el.dailyList.innerHTML = html;

        if (daily.sunrise && daily.sunrise[0]) {
          el.sunriseVal.textContent = fmtSunTime(daily.sunrise[0]);
          el.sunsetVal.textContent  = fmtSunTime(daily.sunset && daily.sunset[0]);
          el.sunRow.style.display = '';
        } else {
          el.sunRow.style.display = 'none';
        }
        el.dailySection.style.display = '';
      }

      function applyUnit() {
        const u = getUnit();
        el.tempUnit.textContent = u === 'F' ? '°F' : '°C';
        el.unitC.classList.toggle('active', u === 'C');
        el.unitF.classList.toggle('active', u === 'F');
        el.unitC.setAttribute('aria-pressed', String(u === 'C'));
        el.unitF.setAttribute('aria-pressed', String(u === 'F'));
        if (lastData) {
          const c = lastData.current || {};
          el.temp.textContent     = toDisplay(c.temperature_2m);
          el.feelsLike.textContent = 'Feels like ' + toDisplay(c.apparent_temperature) + '°';
          if (lastData.hourly) renderHourly(lastData.hourly, c.time);
          if (lastData.daily)  renderDaily(lastData.daily);
        }
      }

      el.unitC.addEventListener('click', () => { saveUnit('C'); applyUnit(); });
      el.unitF.addEventListener('click', () => { saveUnit('F'); applyUnit(); });

      // ----- Render -----
      function swapCard(update) {
        el.card.classList.add('swap');
        setTimeout(() => {
          update();
          requestAnimationFrame(() => el.card.classList.remove('swap'));
        }, 180);
      }

      async function loadCity(place) {
        if (!place) return;
        el.card.classList.add('loading');
        setStatus('Loading weather…');
        if (weatherAbort) weatherAbort.abort();
        weatherAbort = new AbortController();

        try {
          const data = await fetchWeather(place.latitude, place.longitude, {
            signal: weatherAbort.signal,
          });
          lastData  = data;
          lastPlace = place;
          const c = data.current || {};
          const isDay = c.is_day !== 0;

          swapCard(() => {
            el.city.textContent    = place.name;
            el.region.textContent  = formatLocation(place);
            el.temp.textContent    = toDisplay(c.temperature_2m);
            el.tempUnit.textContent = getUnit() === 'F' ? '°F' : '°C';
            el.description.textContent = describeCode(c.weather_code, isDay);
            el.feelsLike.textContent =
              'Feels like ' + toDisplay(c.apparent_temperature) + '°';
            el.humidity.textContent = Math.round(c.relative_humidity_2m) + '%';
            const uv = c.uv_index;
            el.uv.textContent      = uv != null ? Number(uv).toFixed(1) : '--';
            el.uvLevel.textContent = uvLevel(uv) || ' ';
            el.wind.textContent    = Math.round(c.wind_speed_10m) + ' km/h';
            el.precip.textContent  =
              c.precipitation != null ? c.precipitation.toFixed(1) + ' mm' : '-- mm';
            el.windDir.textContent = windDirLabel(c.wind_direction_10m);
            el.pressure.textContent =
              c.surface_pressure != null ? Math.round(c.surface_pressure) + ' hPa' : '-- hPa';
            el.updated.textContent = formatTime(c.time);
            renderVisuals(c.weather_code, isDay);
          });

          if (data.hourly) renderHourly(data.hourly, c.time);
          if (data.daily)  renderDaily(data.daily);

          setStatus('');
          persistCity(place);
        } catch (err) {
          if (err.name === 'AbortError') return;
          console.error(err);
          setStatus('Could not load weather. Check your connection.', true);
        } finally {
          el.card.classList.remove('loading');
        }
      }

      function persistCity(place) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({
            name: place.name,
            admin1: place.admin1,
            country: place.country,
            latitude: place.latitude,
            longitude: place.longitude,
          }));
        } catch (_) { /* ignore */ }
      }

      function restoreCity() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return null;
          const p = JSON.parse(raw);
          if (p && p.latitude != null && p.longitude != null) return p;
          return null;
        } catch (_) { return null; }
      }

      // ----- Suggestions -----
      function openSuggestions()  { el.suggestions.classList.add('open'); }
      function closeSuggestions() { el.suggestions.classList.remove('open'); }

      function renderSuggestions(results, query) {
        if (!results || !results.length) {
          el.suggestions.innerHTML =
            '<div class="suggestions-empty">No cities found for "' +
            escapeHtml(query) + '"</div>';
          openSuggestions();
          return;
        }
        el.suggestions.innerHTML = results.slice(0, 6).map((r, i) =>
          '<button class="suggestion" type="button" data-index="' + i +
          '" role="option">' +
            '<span>' + escapeHtml(r.name) + '</span>' +
            '<span class="s-sub">' + escapeHtml(formatLocation(r)) + '</span>' +
          '</button>'
        ).join('');
        openSuggestions();
        el.suggestions.querySelectorAll('.suggestion').forEach((btn) => {
          btn.addEventListener('click', () => {
            const idx = Number(btn.dataset.index);
            const place = results[idx];
            closeSuggestions();
            el.search.value = '';
            el.clear.classList.remove('visible');
            el.search.blur();
            loadCity(place);
          });
        });
      }

      const onSearchInput = debounce(async () => {
        const q = el.search.value.trim();
        el.clear.classList.toggle('visible', q.length > 0);
        if (q.length < 2) { closeSuggestions(); return; }
        if (searchAbort) searchAbort.abort();
        searchAbort = new AbortController();
        try {
          const results = await geocode(q, { count: 6, signal: searchAbort.signal });
          renderSuggestions(results, q);
        } catch (err) {
          if (err.name !== 'AbortError') console.error(err);
        }
      }, 250);

      el.search.addEventListener('input', onSearchInput);
      el.search.addEventListener('focus', () => {
        if (el.suggestions.innerHTML) openSuggestions();
      });
      el.search.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          const q = el.search.value.trim();
          if (q.length < 2) return;
          try {
            const results = await geocode(q, { count: 1 });
            if (results && results[0]) {
              closeSuggestions();
              el.search.value = '';
              el.clear.classList.remove('visible');
              el.search.blur();
              loadCity(results[0]);
            } else {
              setStatus('No city found for "' + q + '".', true);
            }
          } catch (_) {
            setStatus('Search failed. Check your connection.', true);
          }
        } else if (e.key === 'Escape') {
          closeSuggestions();
          el.search.blur();
        }
      });

      el.clear.addEventListener('click', () => {
        el.search.value = '';
        el.clear.classList.remove('visible');
        closeSuggestions();
        el.search.focus();
      });

      document.addEventListener('click', (e) => {
        if (!e.target.closest('.search')) closeSuggestions();
      });

      // ----- Boot -----
      async function boot() {
        const saved = restoreCity();
        if (saved) { loadCity(saved); return; }
        try {
          const results = await geocode('Brisbane', { count: 1 });
          loadCity((results && results[0]) || BRISBANE);
        } catch (_) {
          loadCity(BRISBANE);
        }
      }

      // Set initial unit toggle state from saved preference.
      (function initUnit() {
        const u = getUnit();
        el.unitC.classList.toggle('active', u === 'C');
        el.unitF.classList.toggle('active', u === 'F');
        el.unitC.setAttribute('aria-pressed', String(u === 'C'));
        el.unitF.setAttribute('aria-pressed', String(u === 'F'));
        el.tempUnit.textContent = u === 'F' ? '°F' : '°C';
      })();

      // Expose boot for chunk 2 to call after visuals are wired up.
      window.__auroraBoot = boot;
    })();
  </script>

  <script>
    // ===== Aurora Weather — chunk 2: visuals, Lottie, service worker =====
    (() => {
      'use strict';

      // WMO weather code → condition key (day/night aware).
      // https://open-meteo.com/en/docs
      function codeToCondition(code, isDay) {
        if (code === 0) return isDay ? 'clear-day' : 'clear-night';
        if (code === 1 || code === 2) return isDay ? 'partly-day' : 'partly-night';
        if (code === 3) return 'overcast';
        if (code === 45 || code === 48) return 'fog';
        if ([51, 53, 55, 56, 57].indexOf(code) >= 0) return 'drizzle';
        if ([61, 63, 65, 66, 67, 80, 81, 82].indexOf(code) >= 0) return 'rain';
        if ([71, 73, 75, 77, 85, 86].indexOf(code) >= 0) return 'snow';
        if ([95, 96, 99].indexOf(code) >= 0) return 'thunder';
        return isDay ? 'partly-day' : 'partly-night';
      }

      const DESCRIPTIONS = {
        0:  { d: 'Clear sky',           n: 'Clear night' },
        1:  { d: 'Mainly clear',        n: 'Mainly clear' },
        2:  { d: 'Partly cloudy',       n: 'Partly cloudy' },
        3:  { d: 'Overcast',            n: 'Overcast' },
        45: { d: 'Fog',                 n: 'Fog' },
        48: { d: 'Rime fog',            n: 'Rime fog' },
        51: { d: 'Light drizzle',       n: 'Light drizzle' },
        53: { d: 'Drizzle',             n: 'Drizzle' },
        55: { d: 'Dense drizzle',       n: 'Dense drizzle' },
        56: { d: 'Freezing drizzle',    n: 'Freezing drizzle' },
        57: { d: 'Freezing drizzle',    n: 'Freezing drizzle' },
        61: { d: 'Light rain',          n: 'Light rain' },
        63: { d: 'Rain',                n: 'Rain' },
        65: { d: 'Heavy rain',          n: 'Heavy rain' },
        66: { d: 'Freezing rain',       n: 'Freezing rain' },
        67: { d: 'Freezing rain',       n: 'Freezing rain' },
        71: { d: 'Light snow',          n: 'Light snow' },
        73: { d: 'Snow',                n: 'Snow' },
        75: { d: 'Heavy snow',          n: 'Heavy snow' },
        77: { d: 'Snow grains',         n: 'Snow grains' },
        80: { d: 'Rain showers',        n: 'Rain showers' },
        81: { d: 'Rain showers',        n: 'Rain showers' },
        82: { d: 'Violent showers',     n: 'Violent showers' },
        85: { d: 'Snow showers',        n: 'Snow showers' },
        86: { d: 'Heavy snow showers',  n: 'Heavy snow showers' },
        95: { d: 'Thunderstorm',        n: 'Thunderstorm' },
        96: { d: 'Thunder with hail',   n: 'Thunder with hail' },
        99: { d: 'Thunder with hail',   n: 'Thunder with hail' },
      };

      // Condition → visuals. Lottie URLs are LottieFiles public assets;
      // if one fails to load the emoji fallback stays visible.
      const VISUALS = {
        'clear-day': {
          emoji: '☀️',
          lottie: 'https://assets9.lottiefiles.com/packages/lf20_xlky4kvh.json',
          gradient: 'linear-gradient(160deg, #1f0e55 0%, #3a1c8a 35%, #1d4ea8 70%, #0c255b 100%)',
        },
        'clear-night': {
          emoji: '🌙',
          lottie: 'https://assets10.lottiefiles.com/packages/lf20_oygeclid.json',
          gradient: 'linear-gradient(160deg, #0d0530 0%, #1a0a55 40%, #0f1a55 75%, #050820 100%)',
        },
        'partly-day': {
          emoji: '⛅',
          lottie: 'https://assets10.lottiefiles.com/packages/lf20_KUFdS6.json',
          gradient: 'linear-gradient(160deg, #2a1160 0%, #2e2890 40%, #1b3b80 75%, #0e1f50 100%)',
        },

      function ensureLottie() {
        if (lottieReady) return lottieReady;
        lottieReady = new Promise((resolve) => {
          if (customElements.get('lottie-player')) return resolve(true);
          const s = document.createElement('script');
          s.src = 'https://unpkg.com/@lottiefiles/lottie-player@2.0.8/dist/lottie-player.js';
          s.async = true;
          s.onload = () => resolve(true);
          s.onerror = () => resolve(false);
          document.head.appendChild(s);
        });
        return lottieReady;
      }

      // ----- Describe: what text goes under the temperature -----
      window.__auroraDescribe = function (code, isDay) {
        const entry = DESCRIPTIONS[code];
        if (!entry) return '—';

      };

      const bg      = document.querySelector('.bg');
      const animEl  = document.getElementById('animation');
      const emojiEl = document.getElementById('fallbackEmoji');

      let currentCondition = null;
      let currentPlayer = null;

      function mountPlayer(url) {
        const player = document.createElement('lottie-player');
        player.setAttribute('src', url);
        player.setAttribute('background', 'transparent');
        player.setAttribute('speed', '1');
        player.setAttribute('loop', '');
        player.setAttribute('autoplay', '');
        player.style.position = 'absolute';
        player.style.inset = '0';
        player.style.width = '100%';
        player.style.height = '100%';
        player.style.opacity = '0';
        player.style.transition = 'opacity 0.35s ease';

        const clearOthers = () => {
          animEl.querySelectorAll('lottie-player').forEach((p) => {
            if (p !== player) p.remove();
          });
        };

        player.addEventListener('ready', () => {
          player.style.opacity = '1';
          emojiEl.style.opacity = '0';
          clearOthers();
          currentPlayer = player;
        });
        player.addEventListener('error', () => {
          player.remove();
          if (currentPlayer === player) currentPlayer = null;
          emojiEl.style.opacity = '1';
        });

        animEl.appendChild(player);
      }

      function renderLottie(url) {
        if (currentPlayer && currentPlayer.getAttribute('src') === url) return;
        ensureLottie().then((ok) => {
          if (!ok) {
            emojiEl.style.opacity = '1';
            return;
          }
          mountPlayer(url);
        });

      window.__auroraVisuals = function (code, isDay) {

        // Change the background-image only; preserve animated size/position.
        if (bg) bg.style.backgroundImage = v.gradient;

        // Reset emoji opacity until Lottie is ready.
        emojiEl.style.opacity = '1';
        renderLottie(v.lottie);
      };

      window.__auroraEmoji = function (code, isDay) {
