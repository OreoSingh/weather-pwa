<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5" />
  <meta name="theme-color" content="#0b0220" />
  <meta name="description" content="Aurora — a beautiful glassmorphism weather app powered by Open-Meteo." />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Aurora" />

  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />

  <title>Aurora Weather</title>

  <style>
    /* ----- Reset & base ----- */
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-tap-highlight-color: transparent;
      text-rendering: optimizeLegibility;
    }
    html { height: -webkit-fill-available; }
    body {
      min-height: 100vh;
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: #f4f2ff;
      overflow-x: hidden;
      position: relative;
      background: #0b0220;
    }
    button, input { font: inherit; color: inherit; }
    button { border: 0; background: none; cursor: pointer; }

    /* ----- Animated gradient background ----- */
    .bg {
      position: fixed;
      inset: 0;
      z-index: -2;
      background: linear-gradient(160deg, #1a0a3a 0%, #2a1160 35%, #1b2870 70%, #0b1a4a 100%);
      background-size: 200% 200%;
      animation: bg-shift 24s ease-in-out infinite;
      transition: background 1.2s ease;
    }
    .bg::before, .bg::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
      pointer-events: none;
      will-change: transform;
    }
    .bg::before {
      width: 60vmax; height: 60vmax;
      top: -20vmax; left: -15vmax;
      background: radial-gradient(circle, #6a2bff 0%, transparent 65%);
      animation: blob-a 22s ease-in-out infinite;
    }
    .bg::after {
      width: 55vmax; height: 55vmax;
      bottom: -20vmax; right: -20vmax;
      background: radial-gradient(circle, #1e6bff 0%, transparent 65%);
      animation: blob-b 28s ease-in-out infinite;
    }
    @keyframes bg-shift {
      0%, 100% { background-position: 0% 0%; }
      50% { background-position: 100% 100%; }
    }
    @keyframes blob-a {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(8vmax, 6vmax) scale(1.15); }
    }
    @keyframes blob-b {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-6vmax, -4vmax) scale(1.1); }
    }

    /* Star specks */
    .stars {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background-image:
        radial-gradient(1px 1px at 18% 22%, rgba(255,255,255,0.55), transparent 60%),
        radial-gradient(1px 1px at 72% 8%, rgba(255,255,255,0.4), transparent 60%),
        radial-gradient(1px 1px at 33% 78%, rgba(255,255,255,0.35), transparent 60%),
        radial-gradient(1.5px 1.5px at 88% 56%, rgba(255,255,255,0.55), transparent 60%),
        radial-gradient(1px 1px at 56% 41%, rgba(255,255,255,0.25), transparent 60%),
        radial-gradient(1px 1px at 10% 64%, rgba(255,255,255,0.35), transparent 60%);
      opacity: 0.7;
    }

    /* ----- Layout ----- */
    .app {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding:
        calc(env(safe-area-inset-top, 0px) + 20px)
        calc(env(safe-area-inset-right, 0px) + 16px)
        calc(env(safe-area-inset-bottom, 0px) + 28px)
        calc(env(safe-area-inset-left, 0px) + 16px);
      gap: 16px;
    }

    .header {
      width: 100%;
      max-width: 480px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.75);
    }
    .brand-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, #b388ff, #82b1ff);
      box-shadow: 0 0 12px rgba(130, 177, 255, 0.8);
    }

    /* ----- Search ----- */
    .search {
      width: 100%;
      max-width: 480px;
      position: relative;
    }
    .search-input-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      transition: border-color 0.25s ease, background 0.25s ease;
    }
    .search-input-wrap:focus-within {
      border-color: rgba(179, 136, 255, 0.6);
      background: rgba(255,255,255,0.12);
    }
    .search-icon {
      width: 18px; height: 18px;
      flex-shrink: 0;
      opacity: 0.8;
    }
    .search input {
      flex: 1;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: #fff;
      font-size: 16px;
      padding: 4px 0;
    }
    .search input::placeholder { color: rgba(255,255,255,0.5); }
    .search-clear {
      display: none;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      flex-shrink: 0;
    }
    .search-clear.visible { display: inline-flex; }

    .suggestions {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      padding: 6px;
      border-radius: 18px;
      background: rgba(20, 10, 45, 0.75);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      box-shadow: 0 16px 40px rgba(0,0,0,0.45);
      max-height: 50vh;
      overflow-y: auto;
      z-index: 10;
      display: none;
    }
    .suggestions.open { display: block; }
    .suggestion {
      width: 100%;
      text-align: left;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 15px;
      color: #fff;
      display: flex;
      flex-direction: column;
      gap: 2px;
      transition: background 0.15s ease;
    }
    .suggestion:hover, .suggestion:focus-visible {
      background: rgba(255,255,255,0.1);
      outline: 0;
    }
    .suggestion .s-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
    }
    .suggestions-empty {
      padding: 14px;
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      text-align: center;
    }

    /* ----- Weather card ----- */
    .card {
      width: 100%;
      max-width: 480px;
      padding: 22px 22px 18px;
      border-radius: 28px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(24px) saturate(170%);
      -webkit-backdrop-filter: blur(24px) saturate(170%);
      box-shadow:
        0 20px 50px rgba(0,0,0,0.45),
        inset 0 1px 0 rgba(255,255,255,0.12);
      position: relative;
      overflow: hidden;
      transition: transform 0.4s ease, opacity 0.4s ease;
    }
    .card.loading { opacity: 0.6; }
    .card.swap { opacity: 0; transform: translateY(8px); }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .location {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .city {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .region {
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .updated {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      text-align: right;
      white-space: nowrap;
    }

    .animation {
      margin: 6px auto 0;
      width: 220px;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .animation lottie-player { width: 100%; height: 100%; }
    .animation .fallback-emoji {
      font-size: 120px;
      line-height: 1;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,0.35));
      transition: opacity 0.4s ease;
    }

    .temp {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 4px;
      margin-top: 4px;
    }
    .temp-value {
      font-size: 96px;
      font-weight: 200;
      line-height: 1;
      letter-spacing: -0.04em;
      background: linear-gradient(180deg, #ffffff 0%, #d7cbff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .temp-unit {
      font-size: 28px;
      font-weight: 300;
      margin-top: 10px;
      color: rgba(255,255,255,0.85);
    }
    .description {
      text-align: center;
      margin-top: 2px;
      font-size: 18px;
      font-weight: 500;
      color: rgba(255,255,255,0.92);
      text-transform: capitalize;
      letter-spacing: 0.01em;
    }
    .feels-like {
      text-align: center;
      margin-top: 4px;
      font-size: 13px;
      color: rgba(255,255,255,0.6);
    }

    /* ----- Stats grid ----- */
    .stats {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .stat {
      padding: 12px 10px;
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-align: center;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .stat:hover { background: rgba(255,255,255,0.09); }
    .stat-icon {
      width: 22px; height: 22px;
      opacity: 0.85;
    }
    .stat-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
    }
    .stat-value {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }
    .stat-sub {
      font-size: 10px;
      color: rgba(255,255,255,0.55);
    }

    /* ----- Status / error ----- */
    .status {
      width: 100%;
      max-width: 480px;
      min-height: 20px;
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      text-align: center;
    }
    .status.error { color: #ffb4b4; }

    .footer {
      margin-top: auto;
      padding-top: 10px;
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      text-align: center;
      letter-spacing: 0.05em;
    }
    .footer a { color: rgba(255,255,255,0.65); text-decoration: none; }

    /* ----- Skeleton shimmer ----- */
    .skeleton {
      background: linear-gradient(90deg,
        rgba(255,255,255,0.06) 0%,
        rgba(255,255,255,0.14) 50%,
        rgba(255,255,255,0.06) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.4s linear infinite;
      color: transparent !important;
      border-radius: 10px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ----- Mobile polish ----- */
    @media (max-width: 380px) {
      .temp-value { font-size: 84px; }
      .animation { width: 190px; height: 190px; }
      .city { font-size: 20px; }
      .card { padding: 20px 18px 16px; border-radius: 24px; }
    }
    @media (min-height: 820px) {
      .animation { width: 240px; height: 240px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .bg, .bg::before, .bg::after { animation: none !important; }
      .card { transition: none; }
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="stars" aria-hidden="true"></div>

  <main class="app">
    <header class="header">
      <div class="brand">
        <span class="brand-dot"></span>
        <span>Aurora</span>
      </div>
      <div class="updated" id="updated" aria-live="polite"></div>
    </header>

    <section class="search" role="search">
      <div class="search-input-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input
          id="search"
          type="search"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="words"
          spellcheck="false"
          enterkeyhint="search"
          placeholder="Search any city…"
          aria-label="Search city"
        />
        <button class="search-clear" id="searchClear" aria-label="Clear search">&times;</button>
      </div>
      <div class="suggestions" id="suggestions" role="listbox" aria-label="City suggestions"></div>
    </section>

    <article class="card" id="card" aria-live="polite">
      <div class="card-top">
        <div class="location">
          <div class="city" id="city">Brisbane</div>
          <div class="region" id="region">Queensland, Australia</div>
        </div>
      </div>

      <div class="animation" id="animation" aria-hidden="true">
        <span class="fallback-emoji" id="fallbackEmoji">☀️</span>
      </div>

      <div class="temp">
        <span class="temp-value" id="temp">--</span>
        <span class="temp-unit">°C</span>
      </div>
      <div class="description" id="description">Loading…</div>
      <div class="feels-like" id="feelsLike">Feels like --°</div>

      <div class="stats">
        <div class="stat">
          <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 3c-4 6-6 9-6 12a6 6 0 0 0 12 0c0-3-2-6-6-12z"></path>
          </svg>
          <span class="stat-label">Humidity</span>
          <span class="stat-value" id="humidity">--%</span>
        </div>
        <div class="stat">
          <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
          </svg>
          <span class="stat-label">UV Index</span>
          <span class="stat-value" id="uv">--</span>
          <span class="stat-sub" id="uvLevel">&nbsp;</span>
        </div>
        <div class="stat">
          <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 12h11a3 3 0 1 0-3-3"></path>
            <path d="M3 18h14a3 3 0 1 1-3 3"></path>
          </svg>
          <span class="stat-label">Wind</span>
          <span class="stat-value" id="wind">-- km/h</span>
        </div>
      </div>
    </article>

    <div class="status" id="status"></div>

    <footer class="footer">
      Data by <a href="https://open-meteo.com" target="_blank" rel="noopener noreferrer">Open-Meteo</a>
      · Animations by <a href="https://lottiefiles.com" target="_blank" rel="noopener noreferrer">LottieFiles</a>
    </footer>
  </main>
</body>
</html>
